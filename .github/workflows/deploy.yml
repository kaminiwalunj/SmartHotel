name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: smarthotel-rg  # Update with your resource group name
  AZURE_APP_SERVICE: smarthotel-web    # Update with your app service name
  AZURE_CONTAINER_REGISTRY: smarthotelacr  # Update with your ACR name
  IMAGE_NAME: smarthotel:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to Azure Container Registry
      run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

    - name: Pull previous Docker image for caching
      run: docker pull ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }} || true

    - name: Build Docker image
      run: docker build --cache-from ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }} -t ${{ env.IMAGE_NAME }} .

    - name: Tag Docker image
      run: docker tag ${{ env.IMAGE_NAME }} ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}

    - name: Push Docker image to ACR
      run: docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}

    - name: Deploy to Azure App Service
      run: |
        az webapp config container set \
          --name ${{ env.AZURE_APP_SERVICE }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --docker-custom-image-name ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }} \
          --docker-registry-server-url https://${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
          --enable-app-service-storage false
