{% extends "base.html" %}

{% block title %}Add Room - SmartHotel{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New Room</h2>
</div>

<!-- ANTI-PATTERN: No client-side validation, weak server validation -->
<form method="POST" action="/rooms/add">
    <div class="form-group">
        <label for="hotel_id">Hotel:</label>
        <select name="hotel_id" id="hotel_id" required>
            <option value="">Select a hotel</option>
            {% for hotel in hotels %}
            <option value="{{ hotel.id }}">{{ hotel.name }} ({{ hotel.location }})</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="room_number">Room Number:</label>
        <input type="text" name="room_number" id="room_number" required>
    </div>

    <div class="form-group">
        <label for="room_type">Room Type:</label>
        <select name="room_type" id="room_type" required>
            <option value="">Select type</option>
            <option value="Single">Single</option>
            <option value="Double">Double</option>
            <option value="Suite">Suite</option>
            <option value="Deluxe">Deluxe</option>
        </select>
    </div>

    <div class="form-group">
        <label for="price">Price per Night:</label>
        <input type="number" name="price" id="price" step="0.01" required>
    </div>

    <button type="submit" class="btn btn-primary">Add Room</button>
    <a href="/rooms" class="btn">Cancel</a>
</form>

{% endblock %}
