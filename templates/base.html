<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}SmartHotel - Legacy System{% endblock %}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- ANTI-PATTERN: No responsive design, minimal styling -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-title">SmartHotel Management</h1>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/hotels">Hotels</a>
                <a href="/rooms">Rooms</a>
                <a href="/bookings">Bookings</a>
                <a href="/customers">Customers</a>
                <form action="/search" method="GET" class="search-form" style="display: inline;">
                    <input type="text" name="q" placeholder="Search..." required>
                    <button type="submit">Search</button>
                </form>
                {% if session.get('username') %}
                    <span>Welcome, {{ session['username'] }}</span>
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2026 SmartHotel - Legacy Monolith System</p>
    </footer>
</body>
</html>
